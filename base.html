<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GlicoControl{% endblock %}</title>
  <style>
    :root {
      --teal-dark: #0f3d3e;
      --teal: #1a7a6e;
      --teal-light: #e8f5f2;
      --text: #16211f;
      --muted: #5b6b68;
      --danger: #c0392b;
      --success: #1a7a6e;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f8f7;
      color: var(--text);
    }
    header.topbar {
      background: var(--teal-dark);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header.topbar .brand {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.2px;
    }
    header.topbar nav a {
      color: #cfe8e3;
      text-decoration: none;
      margin-left: 18px;
      font-size: 0.92rem;
    }
    header.topbar nav a:hover { color: #fff; }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 1px 3px rgba(15, 61, 62, 0.08);
      margin-bottom: 20px;
    }
    .auth-card {
      max-width: 420px;
      margin: 40px auto;
    }
    h1 { font-size: 1.5rem; margin: 0 0 6px; }
    h2 { font-size: 1.15rem; margin: 0 0 14px; }
    p.subtitle { color: var(--muted); margin: 0 0 22px; font-size: 0.95rem; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--teal-dark);
    }
    input[type="text"], input[type="email"], input[type="password"], input[type="file"] {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid #d7e3e0;
      border-radius: 10px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      background: #fafcfb;
    }
    input:focus { outline: 2px solid var(--teal); border-color: var(--teal); }
    button, .btn {
      display: inline-block;
      background: var(--teal);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }
    button:hover, .btn:hover { background: var(--teal-dark); }
    .btn-secondary {
      background: transparent;
      color: var(--teal-dark);
      border: 1px solid #cfe0dc;
    }
    .btn-secondary:hover { background: var(--teal-light); }
    .flash {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 0.9rem;
    }
    .flash-error { background: #fdecea; color: var(--danger); }
    .flash-success { background: var(--teal-light); color: var(--teal-dark); }
    .muted-link { color: var(--muted); font-size: 0.9rem; }
    .muted-link a { color: var(--teal); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; font-size: 0.9rem; border-bottom: 1px solid #eef3f2; }
    th { color: var(--muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-baixo { background: #e4f5ea; color: #1a7a49; }
    .badge-moderado { background: #fff3d9; color: #91650b; }
    .badge-alto { background: #fde5e3; color: #a5301f; }
    .empty-state { text-align: center; color: var(--muted); padding: 30px 0; }
    .scan-drop {
      border: 2px dashed #cfe0dc;
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  {% if session.get('user_id') %}
  <header class="topbar">
    <div class="brand">GlicoControl</div>
    <nav>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('scan') }}">Escanear refeição</a>
      <a href="{{ url_for('logout') }}">Sair</a>
    </nav>
  </header>
  {% endif %}
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
