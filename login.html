{% extends "base.html" %}
{% block title %}Entrar — GlicoControl{% endblock %}
{% block content %}
<div class="card auth-card">
  <h1>Entrar no GlicoControl</h1>
  <p class="subtitle">Controle sua glicose e alimentação com IA.</p>
  <form method="post">
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required autofocus>

    <label for="password">Senha</label>
    <input type="password" id="password" name="password" required>

    <button type="submit">Entrar</button>
  </form>
  <p class="muted-link" style="margin-top:16px;">
    Ainda não tem conta? <a href="{{ url_for('signup') }}">Criar conta</a>
  </p>
</div>
{% endblock %}
